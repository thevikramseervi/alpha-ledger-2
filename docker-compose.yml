name: alpha-ledger

services:
  postgres:
    image: postgres:16-alpine
    container_name: alpha-ledger-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: alpha
      POSTGRES_PASSWORD: alpha_secret
      POSTGRES_DB: alpha_ledger
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alpha -d alpha_ledger"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
